# ══════════════════════════════════════════════════════════════════════════════
# layers.yml — tile layer definitions
#
# Each layer produces a tile set at:
#   docs/tiles/<id>/{z}/{x}/{y}.png
#
# Two source types are supported:
#   geojson — fetches a GeoJSON URL and renders polygons using our renderer
#   wmts    — downloads existing raster tiles from a public WMTS/XYZ endpoint
#
# To add a new layer: copy a block below and adjust the fields.
# ══════════════════════════════════════════════════════════════════════════════

# ── Defaults applied to every layer (can be overridden per layer) ─────────────
defaults:
  bounds: [5.96, 45.82, 10.49, 47.81]   # Switzerland  (west, south, east, north)
  zoom:
    min: 5
    max: 10

# ── Layer definitions ─────────────────────────────────────────────────────────
layers:

  # ── SLF: total snow depth (Schneehöhe) ──────────────────────────────────────
  - id: slf-snow-depth
    name: Snow Depth (HS 1-day)
    description: >
      SLF daily gridded snow depth model (HS1D-v2). Updated at 06:00 UTC.
      Colour-coded by depth class; semi-transparent areas indicate partial cover.
    type: geojson
    url: https://snow-maps-hs.slf.ch/public/hs/map/HS1D-v2/current/geojson
    schedule: "15 7 * * *"   # 07:15 UTC daily — SLF publishes at 06:00 UTC
    attribution: "© WSL Institute for Snow and Avalanche Research SLF (www.slf.ch)"
    style:
      fill_property: fill            # GeoJSON property containing hex colour
      partial_property: partialSnowCover
      opacity_full: 0.82
      opacity_partial: 0.43
    legend:
      - { label: "1–20 cm",    color: "#CDFFCD" }
      - { label: "20–50 cm",   color: "#99F0B2" }
      - { label: "50–80 cm",   color: "#53BD9F" }
      - { label: "80–120 cm",  color: "#3296B4" }
      - { label: "120–200 cm", color: "#0670B0" }
      - { label: "200–300 cm", color: "#054F8C" }
      - { label: "> 300 cm",   color: "#610432" }

  # ── SLF: new snow (Neuschnee) ────────────────────────────────────────────────
  # NOTE: endpoint unconfirmed — update url once check_slf_layers.py output is known
  - id: slf-new-snow
    name: New Snow (HN 1-day)
    description: >
      SLF daily new snow accumulation (HN1D-v2). Updated at 06:00 UTC.
    type: geojson
    url: https://snow-maps-hs.slf.ch/public/hs/map/HN1D-v2/current/geojson
    schedule: "15 7 * * *"
    attribution: "© WSL Institute for Snow and Avalanche Research SLF (www.slf.ch)"
    style:
      fill_property: fill
      partial_property: partialSnowCover
      opacity_full: 0.82
      opacity_partial: 0.43

  # ── swisstopo: slope ≥ 30° ───────────────────────────────────────────────────
  # Static terrain data — run once manually, no need to refresh.
  - id: slope-30
    name: Slope ≥ 30° (Avalanche terrain)
    description: >
      Terrain steeper than 30° — key context layer for avalanche risk.
      Source: swisstopo digital terrain model.
    type: wmts
    url: "https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.hangneigung-ueber_30/default/current/3857/{z}/{x}/{y}.png"
    schedule: null     # static — trigger manually once
    attribution: "© swisstopo (opendata.swiss)"
    zoom:
      min: 5
      max: 12          # worth the extra zoom for terrain detail

  # ── BAFU: avalanche release zones (SilvaProtect-CH) ─────────────────────────
  # Static hazard zones — run once manually.
  - id: avalanche-zones
    name: Avalanche Release Zones
    description: >
      Potential avalanche release areas from the SilvaProtect-CH hazard dataset.
    type: wmts
    url: "https://wmts.geo.admin.ch/1.0.0/ch.bafu.silvaprotect-lawinen/default/current/3857/{z}/{x}/{y}.png"
    schedule: null
    attribution: "© BAFU/OFEV (opendata.swiss)"
    zoom:
      min: 5
      max: 11

  # ── TEMPLATE: add your own layer ────────────────────────────────────────────
  # Uncomment and fill in to add a new GeoJSON source:
  #
  # - id: my-layer
  #   name: My Layer
  #   description: What this layer shows.
  #   type: geojson
  #   url: https://example.com/data.geojson
  #   schedule: "0 8 * * *"   # cron, or null for manual-only
  #   attribution: "© Source Name"
  #   bounds: [5.96, 45.82, 10.49, 47.81]   # optional override
  #   zoom: { min: 5, max: 10 }             # optional override
  #   style:
  #     fill_property: fill
  #     partial_property: partialSnowCover
  #     opacity_full: 0.82
  #     opacity_partial: 0.43
  #   legend:
  #     - { label: "Class A", color: "#aabbcc" }
  #
  # Or for a WMTS/XYZ source:
  #
  # - id: my-wmts-layer
  #   name: My WMTS Layer
  #   type: wmts
  #   url: "https://tiles.example.com/{z}/{x}/{y}.png"
  #   schedule: null
  #   attribution: "© Source Name"
